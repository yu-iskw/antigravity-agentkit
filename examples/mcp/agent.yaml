apiVersion: antigravity-agentkit.dev/v1alpha1
kind: Agent
metadata:
  name: mcp-demo
  displayName: MCP Demo
  description: Demonstrates MCP tools, policies, and evals with a local clock server.
  owner: platform-team
  labels:
    domain: examples
spec:
  runtime:
    framework: antigravity
    model: gemini-3.1-flash-lite
    vertex:
      enabled: false
    capabilities:
      mode: restricted
  instructions:
    system: SYSTEM.md
  mcp:
    admissionPolicy:
      allowedServers:
        - clock
  policies: {}
  evals:
    files:
      - evals/smoke.yaml
