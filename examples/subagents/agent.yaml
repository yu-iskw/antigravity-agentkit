apiVersion: antigravity-agentkit.dev/v1alpha1
kind: Agent
metadata:
  name: subagents-demo
  displayName: Subagents Demo
  description: Demonstrates markdown subagent delegation tools.
spec:
  runtime:
    framework: antigravity
    model: gemini-3.1-flash-lite
    vertex:
      enabled: false
  instructions:
    system: SYSTEM.md
  subagents:
    - name: proofreader
      type: markdown
      file: subagents/proofreader.md
