apiVersion: antigravity-agentkit.dev/v1alpha1
kind: Deployment
metadata:
  name: ship-agent
  namespace: ship-agent-test
spec:
  target: agent-platform
  displayName: Ship Agent
  serviceAccount: ship-agent@test-project.iam.gserviceaccount.com
  minInstances: 0
  maxInstances: 1
  containerConcurrency: 2
  resourceLimits:
    cpu: "1"
    memory: 512Mi
  labels:
    env: test
  gateway:
    enabled: true
    egressPolicy: restricted
    requiredEndpoints:
      - https://example.googleapis.com
